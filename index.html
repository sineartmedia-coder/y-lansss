<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pencere Yılanı - Window Snake</title>
    <style>
        :root {
            --neon-green: #39ff14;
            --neon-pink: #ff00ff;
            --dark-bg: #0a0a0a;
            --panel-bg: rgba(20, 20, 20, 0.85);
            --accent-color: #00f3ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; /* Disable browser gestures like zoom and double-tap */
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            overflow-x: hidden;
            padding-top: 0;
            margin: 0;
        }

        #game-container {
            position: relative;
            width: 100vw;
            max-width: 100vw; /* Truly full width on mobile */
            aspect-ratio: 1 / 1;
            box-shadow: 0 0 40px rgba(0, 243, 255, 0.2);
            border: 2px solid var(--accent-color);
            border-radius: 8px;
            overflow: hidden;
            background-size: cover;
            background-position: center;
            margin-top: 10px;
            background-color: #000;
        }

        /* Input for image upload removed */

        /* The HUD outside */
        .hud {
            width: 98vw;
            max-width: 600px;
            display: flex;
            justify-content: space-between;
            background: var(--panel-bg);
            padding: 8px 15px;
            border-radius: 12px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 243, 255, 0.3);
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.1);
            font-size: 0.8rem;
        }

        /* The Mask Canvas */
        #mask-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        /* The UI Layer */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #score-board span {
            color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-green);
        }

        #high-score-board span {
            color: var(--neon-pink);
            text-shadow: 0 0 10px var(--neon-pink);
        }

        .screen {
            background: var(--panel-bg);
            padding: 20px;
            width: 85%;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            pointer-events: auto;
            text-align: center;
            display: none;
            animation: fadeIn 0.5s ease-out;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .screen.active {
            display: block;
        }

        h1 {
            font-size: clamp(1.2rem, 5vw, 2.5rem);
            margin-bottom: 10px;
            background: linear-gradient(to right, var(--neon-green), var(--accent-color));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 243, 255, 0.3);
        }

        /* Mobile Controls - GIGANTIC */
        #mobile-controls {
            display: flex !important;
            margin-top: 10px !important;
            margin-bottom: 40px !important;
            width: 100% !important;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 10px;
            background: rgba(0, 0, 0, 0.4);
            padding: 20px 0;
            border-top: 2px solid var(--accent-color);
        }

        .d-pad-row {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .control-btn {
            width: 32vw !important;
            height: 32vw !important;
            background: rgba(10, 10, 10, 0.95) !important;
            border: 4px solid var(--accent-color) !important;
            border-radius: 20px !important;
            color: var(--accent-color) !important;
            display: flex !important;
            justify-content: center;
            align-items: center;
            font-size: 16vw !important;
            cursor: pointer;
            user-select: none;
            box-shadow: 0 0 35px rgba(0, 243, 255, 0.5);
            transition: all 0.1s;
            touch-action: manipulation;
        }

        .control-btn:active {
            background: var(--accent-color);
            color: black;
            transform: scale(0.9);
            box-shadow: 0 0 20px var(--accent-color);
        }

        @media (max-width: 768px) {
            .hud {
                margin-top: 5px;
                width: 100vw;
                max-width: 100vw;
                padding: 10px;
                border-radius: 0;
            }
            #game-container {
                margin-top: 5px;
                width: 100vw;
                max-width: 100vw;
                border-radius: 0;
            }

            body {
                overflow-y: auto;
                justify-content: flex-start;
                padding-top: 0;
            }
        }

        button {
            background: transparent;
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
            padding: 12px 30px;
            font-size: 1.1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            font-weight: bold;
            margin-top: 15px;
        }

        button:hover {
            background: var(--accent-color);
            color: black;
            box-shadow: 0 0 20px var(--accent-color);
        }

        .controls-hint {
            margin-top: 20px;
            font-size: 0.8rem;
            opacity: 0.6;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="hud">
        <div id="score-board">SKOR: <span id="score">0</span></div>
        <div id="high-score-board">EN YÜKSEK: <span id="high-score">0</span></div>
    </div>

    <div id="game-container">
        <!-- The gray mask is drawn here -->
        <canvas id="mask-canvas"></canvas>

        <div id="ui-layer">
            <div id="start-screen" class="screen active">
                <h1>PENCERE YILANI</h1>
                <p style="font-size: 0.9rem;">Yılan büyüdükçe arkadaki dünyayı keşfet.</p>
                <button onclick="startGame()">OYUNA BAŞLA</button>
                <div class="controls-hint">Yön tuşları veya parmağınla kaydır.</div>
            </div>

            <div id="game-over-screen" class="screen">
                <h1 style="background: var(--neon-pink); -webkit-background-clip: text; background-clip: text;">OYUN BİTTİ!</h1>
                <p>Müthişti! Resmin bir kısmını daha açtın.</p>
                <div style="margin: 15px 0;">Skor: <span id="final-score" style="color: var(--neon-green)">0</span></div>
                <button onclick="startGame()">TEKRAR DENE</button>
            </div>
        </div>
    </div>

    <div id="mobile-controls">
        <div class="d-pad-row">
            <div class="control-btn" onmousedown="handleDirection('ArrowUp')" ontouchstart="handleDirection('ArrowUp')">▲</div>
        </div>
        <div class="d-pad-row" style="gap: 2vw;">
            <div class="control-btn" onmousedown="handleDirection('ArrowLeft')" ontouchstart="handleDirection('ArrowLeft')">◀</div>
            <div class="control-btn" onmousedown="handleDirection('ArrowDown')" ontouchstart="handleDirection('ArrowDown')">▼</div>
            <div class="control-btn" onmousedown="handleDirection('ArrowRight')" ontouchstart="handleDirection('ArrowRight')">▶</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('mask-canvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('high-score');
        const finalScoreElement = document.getElementById('final-score');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const gameContainer = document.getElementById('game-container');

        const gridSize = 40;
        let tileCount;
        let snake = [];
        let foods = []; // Array for multiple hearts
        let dx = 0;
        let dy = 0;
        let nextDx = 0;
        let nextDy = 0;
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameActive = false;
        let revealRadius = gridSize / 2;
        let gameLoop;

        // Touch handling
        let touchStartX = 0;
        let touchStartY = 0;

        // Initialize high score
        highScoreElement.textContent = highScore;

        function initCanvas() {
            // Set canvas size matching its actual container width (square)
            const width = gameContainer.clientWidth;
            canvas.width = width;
            canvas.height = width;
            tileCount = Math.floor(width / gridSize);
            
            // Set provided background
            gameContainer.style.backgroundImage = "url('https://i.imgur.com/MTxtmI9.jpeg')";

            // Draw initial mask
            renderMaskOnly();
        }

        // Image upload handler removed

        function renderMaskOnly() {
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = 'rgba(40, 40, 40, 1)'; // Solid gray
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Grid lines
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath(); ctx.moveTo(i * gridSize, 0); ctx.lineTo(i * gridSize, canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i * gridSize); ctx.lineTo(canvas.width, i * gridSize); ctx.stroke();
            }
        }

        function spawnFood() {
            if (!tileCount) return;
            const newFood = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
            
            // Don't spawn food inside snake or existing food
            for (let part of snake) {
                if (part.x === newFood.x && part.y === newFood.y) return spawnFood();
            }
            if (foods) {
                for (let f of foods) {
                    if (f.x === newFood.x && f.y === newFood.y) return spawnFood();
                }
            }
            
            foods.push(newFood);
        }

        function initFoods() {
            foods = [];
            for (let i = 0; i < 5; i++) {
                spawnFood();
            }
        }

        window.onload = initCanvas;
        window.onresize = initCanvas;

        function startGame() {
            // Reset state
            const mid = Math.floor(tileCount / 2);
            snake = [
                { x: mid, y: mid },
                { x: mid, y: mid + 1 }
            ];
            dx = 0;
            dy = 0; // Don't move yet!
            nextDx = 0;
            nextDy = 0;
            score = 0;
            scoreElement.textContent = score;
            
            startScreen.classList.remove('active');
            gameOverScreen.classList.remove('active');
            gameActive = true;
            
            initFoods(); 
            
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(draw, 220); // Slower, was 160
        }

        function draw() {
            if (!gameActive) return;

            // Move snake only if direction is set
            if (nextDx === 0 && nextDy === 0) {
                render();
                return;
            }

            dx = nextDx;
            dy = nextDy;
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // Wall collisions
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                return gameOver();
            }

            // Self collisions
            for (let part of snake) {
                if (part.x === head.x && part.y === head.y) return gameOver();
            }

            snake.unshift(head);

            // Eat food
            let ate = false;
            foods.forEach((f, index) => {
                if (head.x === f.x && head.y === f.y) {
                    score += 10;
                    scoreElement.textContent = score;
                    if (score > highScore) {
                        highScore = score;
                        highScoreElement.textContent = highScore;
                        localStorage.setItem('snakeHighScore', highScore);
                    }
                    foods.splice(index, 1);
                    spawnFood();
                    ate = true;
                }
            });

            if (!ate) {
                snake.pop();
            }

            render();
        }

        function render() {
            // 1. Draw Gray Mask Background
            ctx.fillStyle = 'rgba(40, 40, 40, 0.95)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 2. Clear Grid lines visually (The "Gray Grid Screen")
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();ctx.moveTo(i * gridSize, 0); ctx.lineTo(i * gridSize, canvas.height); ctx.stroke();
                ctx.beginPath();ctx.moveTo(0, i * gridSize); ctx.lineTo(canvas.width, i * gridSize); ctx.stroke();
            }

            // 3. REVEAL Mechanic (Using Destination-Out to punch holes in the mask)
            ctx.globalCompositeOperation = 'destination-out';
            
            // Draw snake body as reveal holes
            snake.forEach((part, index) => {
                // We draw a slightly larger circle/square to make the reveal smooth
                ctx.fillStyle = 'black';
                ctx.fillRect(
                    part.x * gridSize + 1, 
                    part.y * gridSize + 1, 
                    gridSize - 2, 
                    gridSize - 2
                );
            });

            // Reset composite to draw UI elements normally on top (like the heart or head indicator)
            ctx.globalCompositeOperation = 'source-over';

            // 4. Draw Food (Hearts ❤️)
            ctx.font = `${gridSize - 4}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            foods.forEach(f => {
                ctx.fillText(
                    '❤️', 
                    f.x * gridSize + gridSize / 2, 
                    f.y * gridSize + gridSize / 2
                );
            });

            // 5. Draw Snake Head indicator (Subtle glow/border so player knows where they are)
            ctx.strokeStyle = 'rgba(0, 243, 255, 0.5)';
            ctx.lineWidth = 2;
            ctx.strokeRect(
                snake[0].x * gridSize, 
                snake[0].y * gridSize, 
                gridSize, 
                gridSize
            );
            
            // Win condition: if snake length equals all tiles
            if (snake.length >= tileCount * tileCount) {
                gameWin();
            }
        }

        function gameOver() {
            gameActive = false;
            clearInterval(gameLoop);
            finalScoreElement.textContent = score;
            gameOverScreen.classList.add('active');
        }

        function gameWin() {
            gameActive = false;
            clearInterval(gameLoop);
            // Full reveal: clear everything
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            alert("TEBRİKLER! Resmin tamamını açtın!");
            gameOver();
        }

        window.addEventListener('keydown', e => {
            handleDirection(e.key);
        });

        // Touch Events
        gameContainer.addEventListener('touchstart', e => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        gameContainer.addEventListener('touchend', e => {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            
            const diffX = touchEndX - touchStartX;
            const diffY = touchEndY - touchStartY;

            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (Math.abs(diffX) > 30) {
                    handleDirection(diffX > 0 ? 'ArrowRight' : 'ArrowLeft');
                }
            } else {
                if (Math.abs(diffY) > 30) {
                    handleDirection(diffY > 0 ? 'ArrowDown' : 'ArrowUp');
                }
            }
        }, { passive: true });

        function handleDirection(key) {
            switch(key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (dy !== 1) { nextDx = 0; nextDy = -1; }
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (dy !== -1) { nextDx = 0; nextDy = 1; }
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (dx !== 1) { nextDx = -1; nextDy = 0; }
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (dx !== -1) { nextDx = 1; nextDy = 0; }
                    break;
            }
        }
    </script>
</body>
</html>
